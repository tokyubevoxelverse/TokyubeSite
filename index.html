<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokyubeVoxelVerse</title>
  <style>
    @font-face {
      font-family: 'ArcadeClassic';
      src: url('fonts/ARCADECLASSIC.TTF') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Animated dark-rainbow grid background (loading screen style) ── */
    @keyframes rainbow-bg {
      0%   { background-position: 0% 0%, 0% 0%, 0% 50%; }
      50%  { background-position: 0% 0%, 0% 0%, 100% 50%; }
      100% { background-position: 0% 0%, 0% 0%, 0% 50%; }
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      font-family: 'ArcadeClassic', monospace;
      background:
        repeating-linear-gradient(
          0deg,
          transparent, transparent 3px,
          rgba(0,0,0,0.25) 3px, rgba(0,0,0,0.25) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent, transparent 3px,
          rgba(0,0,0,0.20) 3px, rgba(0,0,0,0.20) 4px
        ),
        linear-gradient(
          135deg,
          #2d0010, #0a0a2e, #002d1a, #1a0a2d,
          #2d1a00, #002020, #1a002d, #2d0a0a,
          #002d10, #0a1a2d, #2d0018, #0a0a2e
        );
      background-size: 4px 4px, 4px 4px, 600% 600%;
      background-attachment: fixed;
      animation: rainbow-bg 12s ease infinite;
    }

    /* ── Main content column ── */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 60px 20px;
      width: 100%;
      max-width: 620px;
    }

    /* ── Rainbow title ── */
    @keyframes rainbow-color {
      0%   { color: #ff4444; }
      14%  { color: #ff9900; }
      28%  { color: #ffe066; }
      42%  { color: #69db7c; }
      57%  { color: #4dabf7; }
      71%  { color: #9775fa; }
      85%  { color: #f783ac; }
      100% { color: #ff4444; }
    }

    .site-logo {
      max-width: 400px;
      width: 90vw;
      height: auto;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 20px rgba(255, 100, 100, 0.5));
      animation: logo-glow 3s ease-in-out infinite;
    }

    @keyframes logo-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 100, 100, 0.5)); }
      50% { filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.6)); }
    }

    /* ── Platform buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .platform-btn {
      width: 400px;
      max-width: 92vw;
      padding: 15px 26px;
      font-family: 'ArcadeClassic', monospace;
      font-size: clamp(15px, 3vw, 21px);
      border: 3px solid;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-shadow:
        inset 2px 2px 0 rgba(255,255,255,0.35),
        inset -2px -2px 0 rgba(0,0,0,0.45),
        0 5px 18px rgba(0,0,0,0.55);
      transition: transform 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
      letter-spacing: 2px;
    }

    .platform-btn:hover {
      transform: scale(1.04);
      filter: brightness(1.15);
    }

    .platform-btn img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex-shrink: 0;
      image-rendering: -webkit-optimize-contrast;
    }

    /* Steam — light blue → dark blue */
    .btn-steam {
      background: linear-gradient(135deg, #87ceeb 0%, #4a90d9 40%, #1565c0 100%);
      border-color: #0d3b6e;
      color: #fff;
      text-shadow: 1px 1px 0 #000, 2px 2px 0 #0d3b6e;
    }
    .btn-steam:hover {
      box-shadow:
        0 0 24px rgba(21,101,192,0.75),
        inset 2px 2px 0 rgba(255,255,255,0.35),
        inset -2px -2px 0 rgba(0,0,0,0.45);
    }

    /* SteamVR — indigo → dark purple */
    .btn-steamvr {
      background: linear-gradient(135deg, #4b0082 0%, #2d0066 45%, #0d001a 100%);
      border-color: #7a20cc;
      color: #d4b8ff;
      text-shadow: 1px 1px 0 #000, 2px 2px 0 #2d0066;
    }
    .btn-steamvr:hover {
      box-shadow:
        0 0 24px rgba(75,0,130,0.85),
        inset 2px 2px 0 rgba(255,255,255,0.15),
        inset -2px -2px 0 rgba(0,0,0,0.45);
    }

    /* Xbox — silver (small) → lime green → forest green */
    .btn-xbox {
      background: linear-gradient(135deg, #d8d8d8 0%, #c0c0c0 7%, #52c41a 42%, #228b22 100%);
      border-color: #145214;
      color: #002200;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.6), 2px 2px 0 rgba(0,60,0,0.5);
    }
    .btn-xbox:hover {
      box-shadow:
        0 0 24px rgba(50,205,50,0.65),
        inset 2px 2px 0 rgba(255,255,255,0.35),
        inset -2px -2px 0 rgba(0,0,0,0.45);
    }

    /* Switch 2 — pastel red → dark red */
    .btn-switch {
      background: linear-gradient(135deg, #ffb3ba 0%, #e53935 45%, #7b0000 100%);
      border-color: #5c0000;
      color: #fff;
      text-shadow: 1px 1px 0 #000, 2px 2px 0 #5c0000;
    }
    .btn-switch:hover {
      box-shadow:
        0 0 24px rgba(229,57,53,0.75),
        inset 2px 2px 0 rgba(255,255,255,0.35),
        inset -2px -2px 0 rgba(0,0,0,0.45);
    }

    /* ── Tagline row ── */
    .tagline {
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      white-space: nowrap;
      justify-content: center;
      gap: 0;
      font-family: 'ArcadeClassic', monospace;
      font-size: clamp(14px, 3.2vw, 34px);
      letter-spacing: 2px;
    }

    .tagline span {
      text-shadow:
        1px 1px 0 #000,
        2px 2px 0 #000,
        3px 3px 0 #111;
      padding: 0 3px;
    }

    .tag-build   { color: #ff4444; }
    .tag-sep     { color: #fff; }
    .tag-code    { color: #ffe066; }
    .tag-explore { color: #69db7c; }
    .tag-enjoy   { color: #4dabf7; }

    /* ── Description ── */
    .description {
      font-family: 'ArcadeClassic', monospace;
      font-size: clamp(13px, 2.2vw, 18px);
      color: #fff;
      text-align: center;
      letter-spacing: 1px;
      word-spacing: 0.6em;
      line-height: 2;
      max-width: 540px;
      text-shadow:
        1px 1px 0 #000,
        2px 2px 0 #000;
    }

    /* Rainbow animated documentation text */
    .rainbow-doc-text {
      font-family: 'ArcadeClassic', monospace;
      font-size: clamp(11px, 1.8vw, 14px);
      letter-spacing: 1px;
      text-align: center;
      margin-top: 24px;
      line-height: 1.6;
    }

    .rainbow-doc-text span {
      animation: rainbow-color 4s linear infinite;
      text-shadow:
        1px 1px 0 #000,
        2px 2px 0 #000;
      display: inline;
    }

    .rainbow-doc-text span:nth-child(1) { animation-delay: 0s; }
    .rainbow-doc-text span:nth-child(2) { animation-delay: 0.1s; }
    .rainbow-doc-text span:nth-child(3) { animation-delay: 0.2s; }
    .rainbow-doc-text span:nth-child(4) { animation-delay: 0.3s; }
    .rainbow-doc-text span:nth-child(5) { animation-delay: 0.4s; }
    .rainbow-doc-text span:nth-child(6) { animation-delay: 0.5s; }
    .rainbow-doc-text span:nth-child(7) { animation-delay: 0.6s; }
    .rainbow-doc-text span:nth-child(8) { animation-delay: 0.7s; }
    .rainbow-doc-text span:nth-child(9) { animation-delay: 0.8s; }
    .rainbow-doc-text span:nth-child(10) { animation-delay: 0.9s; }
    .rainbow-doc-text span:nth-child(11) { animation-delay: 1s; }
    .rainbow-doc-text span:nth-child(12) { animation-delay: 1.1s; }
    .rainbow-doc-text span:nth-child(13) { animation-delay: 1.2s; }
    .rainbow-doc-text span:nth-child(14) { animation-delay: 1.3s; }
    .rainbow-doc-text span:nth-child(15) { animation-delay: 1.4s; }
    .rainbow-doc-text span:nth-child(16) { animation-delay: 1.5s; }
    .rainbow-doc-text span:nth-child(17) { animation-delay: 1.6s; }
    .rainbow-doc-text span:nth-child(18) { animation-delay: 1.7s; }
    .rainbow-doc-text span:nth-child(19) { animation-delay: 1.8s; }
    .rainbow-doc-text span:nth-child(20) { animation-delay: 1.9s; }
    .rainbow-doc-text span:nth-child(21) { animation-delay: 2s; }
    .rainbow-doc-text span:nth-child(22) { animation-delay: 2.1s; }
    .rainbow-doc-text span:nth-child(23) { animation-delay: 2.2s; }
    .rainbow-doc-text span:nth-child(24) { animation-delay: 2.3s; }
    .rainbow-doc-text span:nth-child(25) { animation-delay: 2.4s; }
    .rainbow-doc-text span:nth-child(26) { animation-delay: 2.5s; }
    .rainbow-doc-text span:nth-child(27) { animation-delay: 2.6s; }
    .rainbow-doc-text span:nth-child(28) { animation-delay: 2.7s; }
    .rainbow-doc-text span:nth-child(29) { animation-delay: 2.8s; }
    .rainbow-doc-text span:nth-child(30) { animation-delay: 2.9s; }

    /* ── Right-side Animated Hamburger Menu ── */
    .side-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
      border-left: 3px solid #444;
      box-shadow: -8px 0 32px rgba(0, 0, 0, 0.8);
      padding: 20px 0;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 1000;
    }

    .side-menu.active {
      transform: translateX(0);
    }

    .menu-item {
      padding: 16px 24px;
      font-family: 'ArcadeClassic', monospace;
      font-size: 16px;
      letter-spacing: 2px;
      border: none;
      background: none;
      color: #fff;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .menu-item:hover {
      filter: brightness(1.2);
      transform: translateX(-8px);
    }

    /* Creating Worlds - Red */
    .menu-item.creating-worlds {
      background: linear-gradient(90deg, #ff6b6b 0%, #e03131 100%);
      color: #fff;
      font-weight: bold;
      border-bottom: 2px solid #c92a2a;
    }

    /* In World Tools - Orange */
    .menu-item.in-world-tools {
      background: linear-gradient(90deg, #ff922b 0%, #e67700 100%);
      color: #fff;
      font-weight: bold;
      border-bottom: 2px solid #d9480f;
    }

    /* Tokyube Code Blocks - Yellow */
    .menu-item.code-blocks {
      background: linear-gradient(90deg, #ffd43b 0%, #f9ca24 100%);
      color: #333;
      font-weight: bold;
      border-bottom: 2px solid #e8b923;
    }

    /* TokyPhone - Green */
    .menu-item.tokyphone {
      background: linear-gradient(90deg, #51cf66 0%, #40c057 100%);
      color: #fff;
      font-weight: bold;
      border-bottom: 2px solid #2f9e44;
    }

    /* TokyTokinz - Blue */
    .menu-item.tokytokinz {
      background: linear-gradient(90deg, #4dabf7 0%, #1971c2 100%);
      color: #fff;
      font-weight: bold;
      border-bottom: 2px solid #1550ab;
    }

    /* TokySocial - Purple */
    .menu-item.tokysocial {
      background: linear-gradient(90deg, #b197fc 0%, #7950f2 100%);
      color: #fff;
      font-weight: bold;
      border-bottom: 2px solid #6741d9;
    }

    .menu-arrow {
      font-size: 20px;
      transition: transform 0.3s ease;
    }

    .menu-item.expanded .menu-arrow {
      transform: rotate(90deg);
    }

    .submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0, 0, 0, 0.3);
    }

    .submenu.open {
      max-height: 1000px;
    }

    .submenu-item {
      padding: 12px 48px;
      font-family: 'ArcadeClassic', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      border: none;
      background: none;
      color: #fff;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.15s ease;
      display: block;
    }

    .submenu-item:hover {
      filter: brightness(1.15);
      transform: translateX(-6px);
    }

    /* Pastel Red Submenu */
    .submenu.creating-worlds-sub .submenu-item {
      background: #ffb3b3;
      color: #333;
    }

    /* Pastel Orange Submenu */
    .submenu.in-world-tools-sub .submenu-item {
      background: #ffcc99;
      color: #333;
    }

    /* Pastel Yellow Submenu */
    .submenu.code-blocks-sub .submenu-item {
      background: #ffeb99;
      color: #333;
    }

    /* Pastel Green Submenu */
    .submenu.tokyphone-sub .submenu-item {
      background: #b3e5b3;
      color: #333;
    }

    /* Menu trigger area (right edge of screen) */
    .menu-trigger {
      position: fixed;
      top: 0;
      right: 0;
      width: 40px;
      height: 100vh;
      cursor: pointer;
      z-index: 999;
    }
  </style>
</head>

    <button class="menu-item creating-worlds" data-menu="creating-worlds">

  <script>
    const sideMenu = document.getElementById('sideMenu');
    const menuTrigger = document.getElementById('menuTrigger');
    const menuItems = document.querySelectorAll('.menu-item');
    let menuTimeout;

    // Show menu when mouse approaches right edge
    document.addEventListener('mousemove', (e) => {
      clearTimeout(menuTimeout);
      
      if (e.clientX > window.innerWidth - 50) {
        sideMenu.classList.add('active');
      } else if (e.clientX < window.innerWidth - 350) {
        // Close menu if mouse moves too far from it
        menuTimeout = setTimeout(() => {
          sideMenu.classList.remove('active');
        }, 300);
      }
    });

    // Handle submenu toggle
    menuItems.forEach(item => {
      item.addEventListener('click', (e) => {
        const menuId = item.dataset.menu;
        const submenu = document.getElementById(`${menuId}-sub`);
        
        // Close other submenus
        document.querySelectorAll('.submenu').forEach(sub => {
          if (sub !== submenu) {
            sub.classList.remove('open');
          }
        });
        
        // Toggle current submenu
        submenu.classList.toggle('open');
        item.classList.toggle('expanded');
      });
    });

    // Prevent menu from closing when hovering over it
    sideMenu.addEventListener('mouseenter', () => {
      clearTimeout(menuTimeout);
    });

    sideMenu.addEventListener('mouseleave', (e) => {
      if (e.clientX < window.innerWidth - 350) {
        menuTimeout = setTimeout(() => {
          sideMenu.classList.remove('active');
        }, 200);
      }
    });
  </script>

</body>
</html>
